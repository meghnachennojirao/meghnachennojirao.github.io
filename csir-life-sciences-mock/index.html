<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSIR-UGC NET Life Sciences Papers</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="title-block">
        <p class="eyebrow">CSIR-UGC NET Life Sciences</p>
        <h1>Question Papers</h1>
        <nav class="top-links" aria-label="Study pages">
          <a aria-current="page" href="./">Question papers</a>
          <a href="concepts.html">Concept map</a>
          <a id="official-archive" href="https://www.csirhrdg.res.in/Home/Index/1/Default/3456/81" target="_blank" rel="noopener">Official archive</a>
        </nav>
      </div>
    </header>

    <main class="paper-reader-shell">
      <section class="paper-control-surface" aria-labelledby="paper-reader-title">
        <div class="paper-heading">
          <p class="eyebrow">Original official paper</p>
          <h2 id="paper-reader-title">CSIR-UGC NET Life Sciences</h2>
          <p>Question wording, options, and order are the original official document.</p>
        </div>
        <label class="paper-picker" for="paper-select">
          <span>Select a session</span>
          <select id="paper-select" name="paper"></select>
        </label>
        <dl class="paper-metadata">
          <div>
            <dt>Session</dt>
            <dd id="paper-session"></dd>
          </div>
          <div>
            <dt>Exam date</dt>
            <dd id="paper-date"></dd>
          </div>
          <div>
            <dt>Document</dt>
            <dd id="paper-format"></dd>
          </div>
          <div>
            <dt>Source</dt>
            <dd id="paper-source"></dd>
          </div>
        </dl>
        <div class="paper-links">
          <a id="open-paper" class="primary link-button" href="#" target="_blank" rel="noopener">Open original paper</a>
          <a id="open-key" class="secondary link-button" href="#" target="_blank" rel="noopener">Open official answer key</a>
        </div>
      </section>

      <section class="paper-viewer-surface" aria-label="Official question paper viewer">
        <iframe id="paper-frame" title="Official question paper" loading="eager"></iframe>
      </section>
    </main>

    <script src="official-papers.js"></script>
    <script src="app.js"></script>
  </body>
</html>
