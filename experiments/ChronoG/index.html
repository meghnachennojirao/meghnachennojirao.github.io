<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChronoG - PER/CRY Circadian Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --panel: #0f1d2d;
        --panel-2: #13283a;
        --ink: #edf7ff;
        --muted: #9fb0c5;
        --line: rgba(177, 208, 234, 0.18);
        --per: #ffc857;
        --cry: #61d3ff;
        --complex: #72e0a8;
        --mir: #ff5a6e;
        --pdf: #b99cff;
        --light: #fff2a6;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 20% 10%, rgba(97, 211, 255, 0.16), transparent 30%),
          radial-gradient(circle at 80% 0%, rgba(255, 200, 87, 0.14), transparent 28%),
          linear-gradient(145deg, #07111f 0%, #0a1424 42%, #120d23 100%);
        color: var(--ink);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button {
        border: 0;
        color: inherit;
        font: inherit;
        cursor: pointer;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(320px, 1fr) 340px;
        gap: 18px;
        width: min(1440px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 18px;
      }

      .stage-shell,
      .side-panel,
      .overlay-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(15, 29, 45, 0.84);
        box-shadow: var(--shadow);
      }

      .stage-shell {
        position: relative;
        overflow: hidden;
        min-height: calc(100vh - 36px);
      }

      .stage-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
      }

      .title-block p {
        margin: 0 0 4px;
        color: var(--cry);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(26px, 4vw, 48px);
        line-height: 1;
      }

      .header-actions {
        display: flex;
        gap: 10px;
      }

      .btn {
        min-height: 42px;
        padding: 0 16px;
        border-radius: 7px;
        background: #f2f7ff;
        color: #08101c;
        font-weight: 900;
      }

      .btn.primary {
        background: var(--complex);
      }

      .btn.ghost {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--ink);
      }

      .game-wrap {
        padding: 16px;
      }

      .game-board {
        position: relative;
        width: 100%;
        aspect-ratio: 4 / 3;
        min-height: 420px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(15, 36, 62, 0.95), rgba(8, 17, 33, 0.98)),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.04) 0 1px, transparent 1px 58px);
      }

      .game-board::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(255, 200, 87, 0.08), transparent 28%, rgba(97, 211, 255, 0.08) 70%, transparent),
          radial-gradient(circle at var(--clock-x, 50%) 12%, rgba(114, 224, 168, 0.18), transparent 22%);
        pointer-events: none;
      }

      .hud {
        position: absolute;
        top: 10px;
        left: 10px;
        right: 10px;
        z-index: 4;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .hud-box {
        min-height: 54px;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 7px;
        background: rgba(7, 17, 31, 0.72);
      }

      .hud-box span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .hud-box strong {
        display: block;
        margin-top: 4px;
        font-size: 18px;
      }

      .entity {
        position: absolute;
        z-index: 3;
        display: grid;
        place-items: center;
        transform: translateZ(0);
        user-select: none;
      }

      .item-label {
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        padding-top: 3px;
        color: rgba(255, 255, 255, 0.76);
        font-size: 10px;
        font-weight: 900;
        white-space: nowrap;
      }

      .toast-stack {
        position: absolute;
        right: 12px;
        bottom: 12px;
        z-index: 12;
        display: grid;
        gap: 8px;
        width: min(330px, calc(100% - 24px));
      }

      .toast {
        padding: 10px 12px;
        border-radius: 7px;
        background: rgba(237, 247, 255, 0.94);
        color: #08101c;
        font-size: 13px;
        font-weight: 800;
      }

      .toast.bad {
        background: #ffdfe4;
      }

      .toast.good {
        background: #dcfbe9;
      }

      .touch-controls {
        display: none;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 10px;
      }

      .touch-controls button {
        min-height: 48px;
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.1);
        font-size: 22px;
        font-weight: 900;
      }

      .side-panel {
        align-self: start;
        display: grid;
        gap: 14px;
        padding: 16px;
        position: sticky;
        top: 18px;
        max-height: calc(100vh - 36px);
        overflow: auto;
      }

      .metric-grid {
        display: grid;
        gap: 10px;
      }

      .metric {
        display: grid;
        gap: 6px;
      }

      .metric-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .track {
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      .track div {
        height: 100%;
        border-radius: inherit;
        background: var(--complex);
      }

      .track.per div {
        background: var(--per);
      }

      .track.cry div {
        background: var(--cry);
      }

      .track.drift div {
        background: var(--mir);
      }

      .track.clk div {
        background: var(--light);
      }

      .facts,
      .legend {
        display: grid;
        gap: 10px;
        padding-top: 2px;
      }

      .facts h2,
      .legend h2 {
        margin: 0;
        font-size: 16px;
      }

      .facts p {
        margin: 0;
        color: #c8d5e4;
        font-size: 13px;
        line-height: 1.5;
      }

      .legend-row {
        display: grid;
        grid-template-columns: 30px 1fr;
        gap: 10px;
        align-items: center;
        color: #d7e5f2;
        font-size: 13px;
        line-height: 1.35;
      }

      .mini-token {
        width: 26px;
        height: 26px;
        border-radius: 50%;
      }

      .mini-token.per {
        background: var(--per);
      }

      .mini-token.cry {
        background: var(--cry);
      }

      .mini-token.mir {
        background: var(--mir);
      }

      .mini-token.pdf {
        background: var(--pdf);
      }

      .overlay {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(4, 10, 18, 0.72);
        backdrop-filter: blur(8px);
      }

      .overlay-card {
        width: min(620px, 100%);
        padding: 24px;
        text-align: center;
      }

      .overlay-card h2 {
        margin: 0 0 10px;
        font-size: clamp(28px, 6vw, 52px);
        line-height: 1;
      }

      .overlay-card p {
        margin: 0 auto 12px;
        max-width: 520px;
        color: #c8d5e4;
        line-height: 1.55;
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin: 16px 0;
      }

      .result-grid div {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.05);
      }

      .result-grid span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .result-grid strong {
        display: block;
        margin-top: 4px;
        font-size: 22px;
      }

      @media (max-width: 1060px) {
        .app {
          grid-template-columns: 1fr;
        }

        .side-panel {
          position: static;
          max-height: none;
        }
      }

      @media (max-width: 700px) {
        .app {
          padding: 10px;
        }

        .stage-header {
          align-items: stretch;
          flex-direction: column;
        }

        .header-actions {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        .game-wrap {
          padding: 10px;
        }

        .game-board {
          min-height: 410px;
        }

        .hud {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .touch-controls {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useCallback, useEffect, useMemo, useRef, useState } = React;

      const BOARD_RATIO = 0.75;
      const AVATAR = { w: 50, h: 66, speed: 9 };
      const ITEM_SIZE = 30;
      const TICK_MS = 33;
      const PHASES = [
        { name: "Dawn", seconds: 16, note: "CLK/CYC drive rises" },
        { name: "Day", seconds: 18, note: "CRY-light reset window" },
        { name: "Dusk", seconds: 16, note: "PER/CRY complexes build" },
        { name: "Night", seconds: 18, note: "negative feedback stabilizes" }
      ];

      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const pct = (value, max = 100) => `${clamp((value / max) * 100, 0, 100)}%`;
      const collide = (a, b) => !(b.x > a.x + a.w || b.x + b.w < a.x || b.y > a.y + a.h || b.y + b.h < a.y);

      function TokenSvg({ type, size = ITEM_SIZE }) {
        const map = {
          PER: { fill: "#ffc857", text: "PER", ink: "#231400" },
          CRY: { fill: "#61d3ff", text: "CRY", ink: "#04141f" },
          LIGHT: { fill: "#fff2a6", text: "LUX", ink: "#211800" },
          PDF: { fill: "#b99cff", text: "PDF", ink: "#150928" },
          MIR: { fill: "#ff5a6e", text: "277", ink: "#fff" }
        };
        const item = map[type];
        if (type === "MIR") {
          return (
            <svg width={size} height={size} viewBox="0 0 40 40" aria-hidden="true">
              <circle cx="20" cy="20" r="18" fill="#2a0d19" stroke={item.fill} strokeWidth="3" />
              <path d="M8 21 C14 7, 22 33, 32 18" fill="none" stroke={item.fill} strokeWidth="4" strokeLinecap="round" />
              <text x="20" y="25" textAnchor="middle" fontSize="10" fontWeight="900" fill="#fff">277</text>
            </svg>
          );
        }
        return (
          <svg width={size} height={size} viewBox="0 0 40 40" aria-hidden="true">
            <circle cx="20" cy="20" r="18" fill={item.fill} stroke="rgba(255,255,255,.75)" strokeWidth="2" />
            <text x="20" y="24" textAnchor="middle" fontSize="11" fontWeight="900" fill={item.ink}>{item.text}</text>
          </svg>
        );
      }

      function AvatarSvg() {
        return (
          <svg width={AVATAR.w} height={AVATAR.h} viewBox="0 0 50 66" aria-hidden="true">
            <rect x="4" y="4" width="42" height="58" rx="14" fill="#edf7ff" />
            <rect x="10" y="13" width="30" height="38" rx="10" fill="#14283d" />
            <circle cx="19" cy="30" r="4" fill="#61d3ff" />
            <circle cx="31" cy="30" r="4" fill="#ffc857" />
            <path d="M17 43 C22 47, 28 47, 33 43" stroke="#72e0a8" strokeWidth="3" strokeLinecap="round" />
          </svg>
        );
      }

      function ClockSvg({ sleeping }) {
        return (
          <svg width="132" height="92" viewBox="0 0 132 92" aria-hidden="true">
            <rect x="10" y="12" width="112" height="68" rx="18" fill={sleeping ? "#153c2c" : "#162948"} stroke="#72e0a8" strokeWidth="3" />
            <circle cx="44" cy="45" r="9" fill={sleeping ? "#72e0a8" : "#edf7ff"} />
            <circle cx="88" cy="45" r="9" fill={sleeping ? "#72e0a8" : "#edf7ff"} />
            <path d={sleeping ? "M47 61 C58 66, 73 66, 85 61" : "M46 61 C58 55, 73 55, 86 61"} stroke="#edf7ff" strokeWidth="4" strokeLinecap="round" fill="none" />
            <path d="M66 18 V45 L84 53" stroke="#ffc857" strokeWidth="4" strokeLinecap="round" fill="none" />
          </svg>
        );
      }

      function useToasts() {
        const [toasts, setToasts] = useState([]);
        const addToast = useCallback((text, tone = "plain") => {
          const id = `${Date.now()}-${Math.random()}`;
          setToasts((items) => [...items.slice(-3), { id, text, tone }]);
          window.setTimeout(() => setToasts((items) => items.filter((item) => item.id !== id)), 2600);
        }, []);
        return { toasts, addToast };
      }

      function ChronoG() {
        const boardRef = useRef(null);
        const keys = useRef({});
        const moveRef = useRef(null);
        const avatarRef = useRef({ x: 385, y: 530 });
        const clockRef = useRef({ x: 345, dir: 1 });
        const statsRef = useRef(null);
        const phaseRef = useRef(0);
        const runningRef = useRef(false);
        const spawnClock = useRef(0);
        const lastTick = useRef(0);
        const [dims, setDims] = useState({ w: 820, h: 615 });
        const [status, setStatus] = useState("start");
        const [avatar, setAvatar] = useState({ x: 385, y: 530 });
        const [clockX, setClockX] = useState(345);
        const [clockDir, setClockDir] = useState(1);
        const [items, setItems] = useState([]);
        const [phaseIndex, setPhaseIndex] = useState(0);
        const [phaseTime, setPhaseTime] = useState(PHASES[0].seconds);
        const [level, setLevel] = useState(1);
        const [stats, setStats] = useState(makeStats(1));
        const { toasts, addToast } = useToasts();

        statsRef.current = stats;
        phaseRef.current = phaseIndex;

        const target = useMemo(() => ({
          complexes: 10 + Math.floor(level * 2.5),
          robustness: Math.max(42, 66 - level * 3),
          phaseError: Math.min(52, 28 + level * 3)
        }), [level]);

        useEffect(() => {
          const board = boardRef.current;
          if (!board) return;
          const resize = () => {
            const width = Math.max(320, board.clientWidth);
            setDims({ w: width, h: Math.max(410, width * BOARD_RATIO) });
          };
          resize();
          const observer = new ResizeObserver(resize);
          observer.observe(board);
          return () => observer.disconnect();
        }, []);

        useEffect(() => {
          const onDown = (event) => {
            keys.current[event.key.toLowerCase()] = true;
            if (["arrowleft", "arrowright", "a", "d", " "].includes(event.key.toLowerCase())) event.preventDefault();
          };
          const onUp = (event) => {
            keys.current[event.key.toLowerCase()] = false;
          };
          window.addEventListener("keydown", onDown);
          window.addEventListener("keyup", onUp);
          return () => {
            window.removeEventListener("keydown", onDown);
            window.removeEventListener("keyup", onUp);
          };
        }, []);

        const prepareLevel = useCallback((nextLevel) => {
          const nextStats = makeStats(nextLevel);
          setStats(nextStats);
          statsRef.current = nextStats;
          setPhaseIndex(0);
          phaseRef.current = 0;
          setPhaseTime(PHASES[0].seconds);
          setItems([]);
          const nextAvatar = { x: dims.w / 2 - AVATAR.w / 2, y: dims.h - AVATAR.h - 14 };
          const nextClock = { x: dims.w / 2 - 66, dir: 1 };
          avatarRef.current = nextAvatar;
          clockRef.current = nextClock;
          setAvatar(nextAvatar);
          setClockX(nextClock.x);
          setClockDir(1);
          spawnClock.current = 0;
          lastTick.current = 0;
        }, [dims]);

        const startGame = useCallback((nextLevel = 1) => {
          setLevel(nextLevel);
          prepareLevel(nextLevel);
          setStatus("playing");
          addToast("Cycle started: pair PER with CRY.", "good");
        }, [addToast, prepareLevel]);

        useEffect(() => {
          runningRef.current = status === "playing";
          if (status !== "playing") return;
          let frame = 0;

          const step = (now) => {
            if (!runningRef.current) return;
            const dt = Math.min(0.05, lastTick.current ? (now - lastTick.current) / 1000 : TICK_MS / 1000);
            lastTick.current = now;
            tickGame(dt);
            frame = window.requestAnimationFrame(step);
          };

          frame = window.requestAnimationFrame(step);
          return () => window.cancelAnimationFrame(frame);
        }, [status, dims, level, target]);

        function tickGame(dt) {
          const activeLeft = keys.current.arrowleft || keys.current.a || moveRef.current === "left";
          const activeRight = keys.current.arrowright || keys.current.d || moveRef.current === "right";
          setAvatar((current) => {
            const dx = (activeRight ? AVATAR.speed : 0) - (activeLeft ? AVATAR.speed : 0);
            const next = { ...current, x: clamp(current.x + dx, 0, dims.w - AVATAR.w), y: dims.h - AVATAR.h - 14 };
            avatarRef.current = next;
            return next;
          });

          setClockX((x) => {
            let dir = clockRef.current.dir;
            let next = x + dir * (1.5 + level * 0.14);
            if (next <= 8 || next >= dims.w - 140) {
              dir *= -1;
              clockRef.current.dir = dir;
              setClockDir(dir);
              next = clamp(next, 8, dims.w - 140);
            }
            clockRef.current.x = next;
            return next;
          });

          spawnClock.current += dt;
          const spawnEvery = Math.max(0.28, 0.62 - level * 0.035);
          if (spawnClock.current >= spawnEvery) {
            spawnClock.current = 0;
            setItems((current) => [...current, spawnItem()]);
          }

          const currentStats = { ...statsRef.current };
          let collected = [];
          setItems((current) => {
            const currentAvatar = avatarRef.current;
            const avatarBox = { x: currentAvatar.x, y: currentAvatar.y, w: AVATAR.w, h: AVATAR.h };
            const kept = [];
            for (const item of current) {
              const next = {
                ...item,
                y: item.y + item.speed * dt,
                x: item.x + Math.sin((item.y + item.seed) / 38) * item.drift
              };
              if (collide(avatarBox, { x: next.x, y: next.y, w: ITEM_SIZE, h: ITEM_SIZE })) {
                collected.push(next.type);
              } else if (next.y < dims.h + 40) {
                kept.push(next);
              }
            }
            return kept;
          });
          if (collected.length) {
            for (const type of collected) applyToken(type, currentStats);
            setStats(currentStats);
            statsRef.current = currentStats;
          }

          setPhaseTime((time) => {
            const next = time - dt;
            if (next > 0) return next;
            return advancePhase();
          });
        }

        function spawnItem() {
          const phase = PHASES[phaseRef.current].name;
          const currentClockX = clockRef.current.x;
          const phasePool = {
            Dawn: ["PER", "CRY", "PER", "PDF", "MIR"],
            Day: ["CRY", "LIGHT", "PER", "PDF", "MIR"],
            Dusk: ["PER", "PER", "CRY", "MIR", "PDF"],
            Night: ["PER", "CRY", "CRY", "MIR", "MIR"]
          }[phase];
          const type = phasePool[Math.floor(Math.random() * phasePool.length)];
          return {
            id: `${Date.now()}-${Math.random()}`,
            type,
            x: clamp(currentClockX + 62 + (Math.random() - 0.5) * 110, 8, dims.w - ITEM_SIZE - 8),
            y: 86,
            speed: (95 + Math.random() * 70 + level * 8) * (type === "MIR" ? 1.08 : 1),
            drift: type === "MIR" ? 1.9 : 0.8,
            seed: Math.random() * 1000
          };
        }

        function applyToken(type, currentStats) {
          if (type === "PER") {
            currentStats.per += 1;
            currentStats.score += 4;
            addToast("PER collected: repression substrate rising.", "plain");
          }
          if (type === "CRY") {
            currentStats.cry += 1;
            currentStats.score += 4;
            currentStats.phaseError = clamp(currentStats.phaseError - 2, 0, 100);
            addToast("CRY collected: reset sensitivity improved.", "good");
          }
          if (type === "LIGHT") {
            currentStats.cry += 1;
            currentStats.phaseError = clamp(currentStats.phaseError - 12, 0, 100);
            currentStats.robustness = clamp(currentStats.robustness + 5, 0, 100);
            currentStats.score += 8;
            addToast("Light-CRY pulse: phase drift corrected.", "good");
          }
          if (type === "PDF") {
            currentStats.phaseError = clamp(currentStats.phaseError - 10, 0, 100);
            currentStats.robustness = clamp(currentStats.robustness + 10, 0, 100);
            currentStats.score += 10;
            addToast("PDF sync pulse: network coherence restored.", "good");
          }
          if (type === "MIR") {
            currentStats.phaseError = clamp(currentStats.phaseError + 11 + level, 0, 100);
            currentStats.robustness = clamp(currentStats.robustness - 11, 0, 100);
            currentStats.clkDrive = clamp(currentStats.clkDrive + 8, 0, 100);
            currentStats.score = Math.max(0, currentStats.score - 12);
            addToast("Mis-timed miR-277 pulse: phase noise increased.", "bad");
          }
          while (currentStats.per > 0 && currentStats.cry > 0) {
            currentStats.per -= 1;
            currentStats.cry -= 1;
            currentStats.complexes += 1;
            currentStats.clkDrive = clamp(currentStats.clkDrive - 5, 0, 100);
            currentStats.phaseError = clamp(currentStats.phaseError - 4, 0, 100);
            currentStats.robustness = clamp(currentStats.robustness + 2, 0, 100);
            currentStats.score += 18;
          }
        }

        function advancePhase() {
          if (phaseRef.current >= PHASES.length - 1) {
            setStatus("analysis");
            runningRef.current = false;
            window.setTimeout(() => {
              const s = statsRef.current;
              const passed = s.complexes >= target.complexes && s.phaseError <= target.phaseError && s.robustness >= target.robustness;
              setStatus(passed ? "won" : "gameover");
            }, 1400);
            return 0;
          }
          const nextIndex = phaseRef.current + 1;
          phaseRef.current = nextIndex;
          setPhaseIndex(nextIndex);
          addToast(`${PHASES[nextIndex].name}: ${PHASES[nextIndex].note}`, "plain");
          return PHASES[nextIndex].seconds;
        }

        const success = stats.complexes >= target.complexes && stats.phaseError <= target.phaseError && stats.robustness >= target.robustness;

        return (
          <main className="app">
            <section className="stage-shell">
              <header className="stage-header">
                <div className="title-block">
                  <p>Drosophila clock rescue</p>
                  <h1>ChronoG</h1>
                </div>
                <div className="header-actions">
                  <button className="btn ghost" onClick={() => startGame(1)}>Restart</button>
                  <button className="btn primary" onClick={() => startGame(level)}>Run cycle</button>
                </div>
              </header>

              <div className="game-wrap">
                <div
                  className="game-board"
                  ref={boardRef}
                  style={{ height: dims.h, "--clock-x": `${clockX + 66}px` }}
                >
                  <div className="hud">
                    <div className="hud-box"><span>Phase</span><strong>{PHASES[phaseIndex].name} {Math.ceil(phaseTime)}s</strong></div>
                    <div className="hud-box"><span>Complexes</span><strong>{stats.complexes}/{target.complexes}</strong></div>
                    <div className="hud-box"><span>Drift</span><strong>{Math.round(stats.phaseError)}</strong></div>
                    <div className="hud-box"><span>Score</span><strong>{stats.score}</strong></div>
                  </div>

                  <div className="entity" style={{ left: clockX, top: 84, width: 132, height: 92 }}>
                    <ClockSvg sleeping={status === "won"} />
                  </div>
                  <div className="entity" style={{ left: avatar.x, top: avatar.y, width: AVATAR.w, height: AVATAR.h }}>
                    <AvatarSvg />
                  </div>
                  {items.map((item) => (
                    <div className="entity" key={item.id} style={{ left: item.x, top: item.y, width: ITEM_SIZE, height: ITEM_SIZE }}>
                      <TokenSvg type={item.type} />
                      <span className="item-label">{item.type === "MIR" ? "miR-277" : item.type}</span>
                    </div>
                  ))}

                  {status !== "playing" && <Overlay status={status} level={level} stats={stats} target={target} success={success} onStart={() => startGame(status === "won" ? level + 1 : level)} />}

                  <div className="toast-stack">
                    {toasts.map((toast) => <div key={toast.id} className={`toast ${toast.tone === "bad" ? "bad" : toast.tone === "good" ? "good" : ""}`}>{toast.text}</div>)}
                  </div>
                </div>

                <div className="touch-controls">
                  <button
                    onMouseDown={() => (moveRef.current = "left")}
                    onMouseUp={() => (moveRef.current = null)}
                    onMouseLeave={() => (moveRef.current = null)}
                    onTouchStart={(event) => { event.preventDefault(); moveRef.current = "left"; }}
                    onTouchEnd={(event) => { event.preventDefault(); moveRef.current = null; }}
                    aria-label="Move left"
                  >{"<"}</button>
                  <button
                    onMouseDown={() => (moveRef.current = "right")}
                    onMouseUp={() => (moveRef.current = null)}
                    onMouseLeave={() => (moveRef.current = null)}
                    onTouchStart={(event) => { event.preventDefault(); moveRef.current = "right"; }}
                    onTouchEnd={(event) => { event.preventDefault(); moveRef.current = null; }}
                    aria-label="Move right"
                  >{">"}</button>
                </div>
              </div>
            </section>

            <aside className="side-panel">
              <section className="metric-grid">
                <Metric label="PER pool" value={stats.per} max={8} className="per" />
                <Metric label="CRY pool" value={stats.cry} max={8} className="cry" />
                <Metric label="Rhythm robustness" value={stats.robustness} max={100} />
                <Metric label="Phase drift" value={stats.phaseError} max={100} className="drift" />
                <Metric label="CLK/CYC drive" value={stats.clkDrive} max={100} className="clk" />
              </section>

              <section className="legend">
                <h2>Clock pieces</h2>
                <Legend color="per" text="PER and CRY pair into negative-feedback complexes." />
                <Legend color="cry" text="CRY and light pulses reduce phase drift." />
                <Legend color="mir" text="Mis-timed miR-277 pulses add phase noise." />
                <Legend color="pdf" text="PDF sync pulses improve network robustness." />
              </section>

              <section className="facts">
                <h2>Biology model</h2>
                <p>PER/CRY complexes act as the stabilizing feedback currency. You win a cycle by forming enough complexes while keeping drift low and robustness high.</p>
                <p>miR-277 is modeled as a timing modulator because Drosophila evidence links it to activity-rest phase, rhythm robustness, and Clk oscillation.</p>
              </section>
            </aside>
          </main>
        );
      }

      function makeStats(level) {
        return {
          per: 0,
          cry: 0,
          complexes: 0,
          robustness: clamp(72 - level * 2, 45, 82),
          phaseError: clamp(24 + level * 3, 18, 48),
          clkDrive: 72,
          score: 0
        };
      }

      function Metric({ label, value, max, className = "" }) {
        return (
          <div className="metric">
            <div className="metric-head"><span>{label}</span><strong>{Math.round(value)}</strong></div>
            <div className={`track ${className}`}><div style={{ width: pct(value, max) }} /></div>
          </div>
        );
      }

      function Legend({ color, text }) {
        return (
          <div className="legend-row">
            <span className={`mini-token ${color}`} />
            <span>{text}</span>
          </div>
        );
      }

      function Overlay({ status, level, stats, target, success, onStart }) {
        if (status === "playing") return null;
        if (status === "analysis") {
          return (
            <div className="overlay">
              <div className="overlay-card">
                <h2>Cycle analysis</h2>
                <p>Checking complex yield, phase drift, and rhythm robustness.</p>
              </div>
            </div>
          );
        }
        const isStart = status === "start";
        const isWon = status === "won";
        return (
          <div className="overlay">
            <div className="overlay-card">
              <h2>{isStart ? "Rescue the rhythm" : isWon ? "Rhythm restored" : "Clock desynchronized"}</h2>
              <p>{isStart
                ? "Assemble PER/CRY feedback complexes, use light and PDF timing cues, and avoid mis-timed miR-277 phase noise."
                : isWon
                  ? "The feedback loop is stable enough for another circadian cycle."
                  : "The loop did not meet the complex, drift, or robustness threshold."}</p>
              {!isStart && (
                <div className="result-grid">
                  <div><span>Complexes</span><strong>{stats.complexes}/{target.complexes}</strong></div>
                  <div><span>Drift</span><strong>{Math.round(stats.phaseError)}/{target.phaseError}</strong></div>
                  <div><span>Robustness</span><strong>{Math.round(stats.robustness)}/{target.robustness}</strong></div>
                </div>
              )}
              <button className="btn primary" onClick={onStart}>{isStart ? "Start cycle" : success ? `Level ${level + 1}` : "Retry cycle"}</button>
            </div>
          </div>
        );
      }

      ReactDOM.render(<ChronoG />, document.getElementById("root"));
    </script>
  </body>
</html>
